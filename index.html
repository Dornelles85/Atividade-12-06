<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realidade Aumentada</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <!-- AR.js atualizado -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #start {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            padding: 12px 18px;
            background: black;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<button id="start">Iniciar Realidade Aumentada</button>

<a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
    arjs="sourceType: webcam;
          debugUIEnabled: false;
          trackingMethod: best;
          sourceWidth: 1280;
          sourceHeight: 960;">

    <!-- Imagem -->
    <a-assets>
        <img id="imagem" src="serpente.jpeg">
    </a-assets>

    <!-- Marcador -->
    <a-marker type="pattern" url="marker.patt">

        <a-image
            src="#imagem"
            position="0 0.5 0"
            rotation="-90 0 0"
            width="1.5"
            height="1">
        </a-image>

    </a-marker>

    <!-- Câmera -->
    <a-entity camera></a-entity>

</a-scene>

<script>
document.getElementById("start").addEventListener("click", () => {
    const scene = document.querySelector("a-scene");

    if (scene && scene.systems && scene.systems.arjs) {
        scene.systems.arjs.start();
    }

    document.getElementById("start").style.display = "none";
});
</script>

</body>
</html>
