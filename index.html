<html lang="pt-BR">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Serpente AR</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
</head>

<body>

    <!-- UI Inicial -->

    <div id="instructions">

        <h2>Aponte para a figura</h2>

        <img src="src/marker.jpeg" alt="Marcador">

    </div>

    <a-scene embedded vr-mode-ui="enabled: false" renderer="logarithmicDepthBuffer: true;"
        arjs="trackingMethod: best; sourceType: webcam;">

        <a-assets>

            <img id="planeImage" src="src/serpente.jpeg">

            <audio id="music" src="src/musicBanzeiro.mp3">
            </audio>

        </a-assets>

        <a-marker id="marker" type="pattern" url="src/marker.patt">

            <a-plane id="imagePlane" src="#planeImage" position="0 0.1 0" rotation="-90 0 0">
            </a-plane>
            <a-entity id="audioEntity" sound="
                    src: #music;
                    autoplay: false;
                    loop: true;">
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

    <script src="script.js"></script>

</body>

</html>
